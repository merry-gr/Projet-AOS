<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inscription | MedConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --med-navy: #0f172a; --med-success: #198754; }
        .register-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; }
        .register-card { border-radius: 24px; overflow: hidden; background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 900px; width: 100%; border: none; }
        .register-left { background: linear-gradient(135deg, var(--med-navy) 0%, #064e3b 100%); color: white; padding: 60px; }
        .register-right { padding: 60px; }
        .btn-register { background: var(--med-success); color: white; border-radius: 12px; padding: 12px; font-weight: bold; width: 100%; border: none; transition: 0.3s; }
        .btn-register:hover { background: #15803d; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="register-wrapper">
    <div class="card register-card">
        <div class="row g-0">
            <div class="col-lg-5 register-left d-none d-lg-flex flex-column justify-content-center">
                <h2>Bienvenue sur MedConnect</h2>
                <p>La plateforme B2B pour le matériel médical en Algérie.</p>
            </div>
            <div class="col-lg-7 register-right">
                <h2 class="h3 mb-4 fw-bold">Créer un compte</h2>
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Nom d'utilisateur</label>
                        <input id="username" type="text" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Email</label>
                        <input id="email" type="email" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Vous êtes ?</label>
                        <select id="role" class="form-select" required>
                            <option value="acheteur">Acheteur (Hôpital, Clinique...)</option>
                            <option value="vendeur">Vendeur (Fournisseur)</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase">Mot de passe</label>
                        <input id="password" type="password" class="form-control" required />
                    </div>
                    
                    <div id="register-error" class="alert alert-danger small" style="display:none"></div>
                    <button type="submit" class="btn btn-register">Créer mon espace pro</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="../../config.js"></script>
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const roleValue = document.getElementById('role').value;
        const payload = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: roleValue
        };

        const errBox = document.getElementById('register-error');
        errBox.style.display = 'none';

        try {
            const resp = await fetch(`${CONFIG.API_USERS_URL}/api/register/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const contentType = resp.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                const data = await resp.json();
                
                if (!resp.ok) {
                    // Gérer les erreurs de validation (ex: utilisateur déjà existant)
                    let errorMessage = "";
                    if (typeof data === 'object') {
                        errorMessage = Object.values(data).flat().join(" ");
                    } else {
                        errorMessage = data.detail || "Erreur d'inscription";
                    }
                    throw new Error(errorMessage);
                }

                // Succès : stockage des tokens
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);
                localStorage.setItem('user_role', roleValue);

                // Redirection
                window.location.href = (roleValue === 'vendeur') ? 'vendor_profile.html' : 'buyer_profile.html';
                
            } else {
                throw new Error("Le serveur a renvoyé une réponse invalide (HTML). Vérifiez l'URL de l'API.");
            }

        } catch (err) {
            errBox.textContent = err.message;
            errBox.style.display = 'block';
        }
    });
</script>
</body>
</html>
