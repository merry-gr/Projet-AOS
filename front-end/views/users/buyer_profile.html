<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <title>Compléter Profil Acheteur | MedConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm p-4 mx-auto" style="max-width: 600px; border-radius:20px;">
        <h2 class="fw-bold mb-2">Détails de l'établissement</h2>
        <p class="text-muted mb-4">Informations nécessaires pour valider votre compte acheteur.</p>
        
        <div id="msg"></div>
        <form id="buyer-form">
            <div class="mb-3">
                <label class="form-label">Nom de la Clinique / Hôpital</label>
                <input id="company_name" class="form-control" placeholder="ex: Clinique Al-Shifa" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Téléphone de contact</label>
                <input id="phone" class="form-control" placeholder="021 XX XX XX" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Adresse complète</label>
                <textarea id="address" class="form-control" rows="3" required></textarea>
            </div>
            <button class="btn btn-primary w-100 py-2" type="submit">Enregistrer et finaliser</button>
        </form>
    </div>
</div>

<script src="../../config.js"></script>
<script>
    const token = localStorage.getItem('access_token');
    if(!token) location.href = 'login.html';

    document.getElementById('buyer-form').addEventListener('submit', async (e)=>{
        e.preventDefault();
        const payload = { 
            company_name: document.getElementById('company_name').value, 
            phone: document.getElementById('phone').value, 
            address: document.getElementById('address').value 
        };

        const r = await fetch(`${CONFIG.API_USERS_URL}/api/profile/`, { 
            method:'POST', 
            headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + token }, 
            body: JSON.stringify(payload) 
        });

        if(r.ok){
            document.getElementById('msg').innerHTML = '<div class="alert alert-success">Profil complété ! Redirection...</div>';
            setTimeout(()=> location.href = 'status_pending.html', 1500);
        } else {
            document.getElementById('msg').innerHTML = '<div class="alert alert-danger">Erreur lors de l\'enregistrement.</div>';
        }
    });
</script>
</body>
</html>
