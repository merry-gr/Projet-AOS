<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <title>Mes Produits | Dashboard</title>
    <style>
        .page-header {
            background: #0f172a;
            color: white;
            padding: 64px 20px;
            border-radius: 0 0 36px 36px;
        }

        .btn-add-new {
            background: #198754;
            color: white;
            border-radius: 12px;
            padding: 12px 18px;
            font-weight: 800;
        }

        .btn-add-new:hover {
            background: #157347;
            color: white;
        }

        .manage-card {
            height: 100%;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 16px 35px rgba(15, 23, 42, 0.08);
        }

        .manage-img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            background: #f8fafc;
        }

        .btn-action-group {
            display: flex;
            gap: 8px;
        }

        .btn-manage {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            border: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
        }

        .btn-manage-view { background: #0d6efd; }
        .btn-manage-edit { background: #f59e0b; }
        .btn-manage-delete { background: #dc3545; }
    </style>
</head>
<body>
    <div class="page-header text-center">
        <h1 class="display-5 fw-bold">Votre Catalogue Produits</h1>
        <a href="add_product.html" class="btn btn-add-new mt-3">
            <i class="bi bi-plus-lg me-2"></i>Ajouter un article
        </a>
    </div>

    <div class="container mt-5 mb-5">
        <div id="vendor-products-list" class="row g-4"></div>
    </div>

    <script src="../../config.js"></script>
    <script src="../../modules/layout.js"></script>
    <script>window.MedLayout.init();</script>
    <script src="../../modules/product_mgr.js"></script>
</body>
</html>
