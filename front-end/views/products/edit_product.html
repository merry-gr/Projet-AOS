<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un Produit | MedConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <style>
        .page-header {
            background: #0f172a;
            color: white;
            padding: 64px 20px 96px;
            border-radius: 0 0 42px 42px;
        }

        .form-card {
            max-width: 850px;
            margin: -64px auto 60px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 22px;
            padding: 32px;
            box-shadow: 0 24px 50px rgba(15, 23, 42, 0.12);
        }

        label {
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
        }

        textarea {
            min-height: 130px;
        }
    </style>
</head>
<body>
    <div class="page-header text-center">
        <h1 class="display-6 fw-bold">Modifier le produit</h1>
    </div>

    <main class="container">
        <div class="form-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0 text-primary"><i class="bi bi-pencil-square me-2"></i>Informations produit</h4>
                <a href="my-products.html" class="text-muted text-decoration-none fw-bold">Annuler</a>
            </div>

            <div id="product-form-error" class="alert alert-danger" style="display:none"></div>

            <form enctype="multipart/form-data" id="editProductForm">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label for="name">Nom du produit</label>
                        <input id="name" name="name" type="text" required>
                    </div>
                    <div class="col-md-4">
                        <label for="category">Catégorie</label>
                        <select id="category" name="category" required>
                            <option value="medicament">Médicament</option>
                            <option value="materiel_medical">Matériel médical</option>
                            <option value="equipement_lourd">Équipement lourd</option>
                            <option value="consommable">Consommable médical</option>
                            <option value="diagnostic">Diagnostic</option>
                            <option value="mobilier">Mobilier médical</option>
                            <option value="laboratoire">Laboratoire</option>
                            <option value="protection">Protection / Hygiène</option>
                            <option value="implant">Implants / Chirurgie</option>
                            <option value="other">Autre</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="price">Prix</label>
                        <input id="price" name="price" type="number" min="0" step="0.01" required>
                    </div>
                    <div class="col-md-6">
                        <label for="stock">Stock</label>
                        <input id="stock" name="stock" type="number" min="0" step="1" required>
                    </div>
                    <div class="col-12">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" required></textarea>
                    </div>
                    <div class="col-md-6">
                        <label for="image">Nouvelle image principale</label>
                        <input id="image" name="image" type="file" accept="image/*">
                    </div>
                    <div class="col-md-6">
                        <label for="image2">Nouvelle image 2</label>
                        <input id="image2" name="image2" type="file" accept="image/*">
                    </div>
                    <div class="col-md-6">
                        <label for="image3">Nouvelle image 3</label>
                        <input id="image3" name="image3" type="file" accept="image/*">
                    </div>
                    <div class="col-md-6">
                        <label for="image4">Nouvelle image 4</label>
                        <input id="image4" name="image4" type="file" accept="image/*">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-4 py-3 fw-bold">
                    <i class="bi bi-save me-2"></i>Enregistrer les modifications
                </button>
            </form>
        </div>
    </main>

    <script src="../../config.js"></script>
    <script src="../../modules/layout.js"></script>
    <script>window.MedLayout.init();</script>
    <script src="../../modules/product_mgr.js"></script>
</body>
</html>
