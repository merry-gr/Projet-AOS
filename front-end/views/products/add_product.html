<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Produit | MedConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <style>
        :root {
            --primary-med: #0d6efd;
            --dark-navy: #0f172a;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
        }

        .page-header {
            background: linear-gradient(135deg, var(--dark-navy) 0%, #1e293b 100%);
            color: white;
            padding: 72px 20px 110px;
            border-radius: 0 0 48px 48px;
        }

        .form-container {
            margin-top: -78px;
            margin-bottom: 60px;
            padding: 0 15px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.12);
        }

        .product-card label {
            display: block;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--dark-navy);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .product-card input,
        .product-card select,
        .product-card textarea {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            background: var(--input-bg);
            font-size: 1rem;
            color: #1e293b;
        }

        .product-card textarea {
            min-height: 130px;
            resize: vertical;
        }

        .product-card input:focus,
        .product-card select:focus,
        .product-card textarea:focus {
            outline: none;
            border-color: var(--primary-med);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
        }

        .product-card input[type="file"] {
            padding: 11px;
            background: #fff;
            border: 2px dashed #cbd5e1;
        }

        .btn-submit {
            background: #1d4ed8;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-weight: 800;
        }

        .btn-submit:hover {
            background: #1e40af;
            color: white;
        }
    </style>
</head>
<body>
    <div class="page-header text-center">
        <div class="container">
            <span class="badge bg-primary-subtle text-primary mb-3 px-4 py-2 rounded-pill fw-bold">PORTAIL VENDEUR</span>
            <h1 class="display-5 fw-bold">Ajouter au Catalogue</h1>
            <p class="opacity-75 fs-5">Publiez un produit dans votre catalogue vendeur.</p>
        </div>
    </div>

    <div class="container form-container">
        <div class="product-card mx-auto" style="max-width: 850px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0 text-primary"><i class="bi bi-box-seam me-2"></i>Fiche Produit</h4>
                <a href="my-products.html" class="text-muted text-decoration-none fw-bold">
                    <i class="bi bi-x-lg me-1"></i> Annuler
                </a>
            </div>

            <div id="product-form-error" class="alert alert-danger" style="display:none"></div>

            <form enctype="multipart/form-data" id="productForm">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label for="name">Nom du produit</label>
                        <input id="name" name="name" type="text" required>
                    </div>
                    <div class="col-md-4">
                        <label for="category">Catégorie</label>
                        <select id="category" name="category" required>
                            <option value="medicament">Médicament</option>
                            <option value="materiel_medical">Matériel médical</option>
                            <option value="equipement_lourd">Équipement lourd</option>
                            <option value="consommable">Consommable médical</option>
                            <option value="diagnostic">Diagnostic</option>
                            <option value="mobilier">Mobilier médical</option>
                            <option value="laboratoire">Laboratoire</option>
                            <option value="protection">Protection / Hygiène</option>
                            <option value="implant">Implants / Chirurgie</option>
                            <option value="other">Autre</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="price">Prix</label>
                        <input id="price" name="price" type="number" min="0" step="0.01" required>
                    </div>
                    <div class="col-md-6">
                        <label for="stock">Stock</label>
                        <input id="stock" name="stock" type="number" min="0" step="1" required>
                    </div>
                    <div class="col-12">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" required></textarea>
                    </div>
                    <div class="col-md-6">
                        <label for="image">Image principale</label>
                        <input id="image" name="image" type="file" accept="image/*" required>
                    </div>
                    <div class="col-md-6">
                        <label for="image2">Image 2</label>
                        <input id="image2" name="image2" type="file" accept="image/*">
                    </div>
                    <div class="col-md-6">
                        <label for="image3">Image 3</label>
                        <input id="image3" name="image3" type="file" accept="image/*">
                    </div>
                    <div class="col-md-6">
                        <label for="image4">Image 4</label>
                        <input id="image4" name="image4" type="file" accept="image/*">
                    </div>
                </div>

                <button type="submit" class="btn btn-submit w-100 mt-4">
                    <i class="bi bi-plus-lg me-2"></i> Enregistrer et publier
                </button>
            </form>
        </div>
    </div>

    <script src="../../config.js"></script>
    <script src="../../modules/layout.js"></script>
    <script>window.MedLayout.init();</script>
    <script src="../../modules/product_mgr.js"></script>
</body>
</html>
