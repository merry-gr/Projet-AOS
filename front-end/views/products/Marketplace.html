<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <title>Marketplace Médical | MedConnect</title>

    <link rel="stylesheet" href="../../assets/css/base.css">

    <style>

        :root {

            --primary: #0d6efd;

            --primary-dark: #0b4db3;

            --accent: #38bdf8;

            --bg-main: #f8fafc;

            --bg-card: rgba(255, 255, 255, 0.9);

            --text-main: #0f172a;

            --text-soft: #64748b;

            --border-soft: rgba(15, 23, 42, 0.08);

        }

        [data-bs-theme="dark"] {

            --bg-main: #020617;

            --bg-card: rgba(15, 23, 42, 0.8);

            --text-main: #f1f5f9;

            --text-soft: #94a3b8;

            --border-soft: rgba(255, 255, 255, 0.08);

        }

        body {

            font-family: 'Plus Jakarta Sans', sans-serif;

            background-color: var(--bg-main);

            color: var(--text-main);

        }

        .hero-marketplace {

            background: linear-gradient(135deg, #0f172a 0%, #1e4ed8 100%);

            color: white;

            padding: 70px 0 60px;

            border-radius: 0 0 36px 36px;

        }

        .filter-wrapper { margin-top: -30px; }

        .glass-card {

            background: var(--bg-card);

            border: 1px solid var(--border-soft);

            border-radius: 22px;

            padding: 18px;

            backdrop-filter: blur(12px);

            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);

        }

        .filter-label {

            font-size: 0.8rem;

            color: var(--text-soft);

            font-weight: 700;

            display: inline-block;

            margin-bottom: 6px;

        }

        .product-card {

            border: 1px solid var(--border-soft);

            border-radius: 20px;

            overflow: hidden;

            background: var(--bg-card);

            height: 100%;

        }

        .img-container { background: #eef2ff; height: 210px; display: flex; align-items: center; justify-content: center; }

        .product-img { max-width: 100%; max-height: 100%; object-fit: cover; }

        .product-title { font-weight: 700; }

        .price-tag { color: var(--primary); font-weight: 800; font-size: 1.2rem; }

        .btn-outline-custom { border-radius: 12px; border: 1px solid var(--primary); color: var(--primary); }

        .btn-outline-custom:hover { background: var(--primary); color: #fff; }

    </style>

</head>

<body data-bs-theme="light">

    <section class="hero-marketplace text-center">

        <div class="container">

            <h1 class="display-4 fw-bold mb-3">MEDCONNECT Marketplace</h1>

            <p class="lead text-white-50">La passerelle directe entre fournisseurs et établissements de santé.</p>

        </div>

    </section>



    <!-- Filtres (Design Source 8) -->

    <div class="container filter-wrapper">

        <div class="glass-card">

            <form id="filter-form" class="row g-3 align-items-end">

                <div class="col-lg-4">

                    <span class="filter-label"><i class="bi bi-search"></i> Désignation</span>

                    <input type="text" id="search-input" class="form-control" placeholder="Scanner, gants...">

                </div>

                <div class="col-lg-4">

                    <span class="filter-label">Catégorie</span>

                    <select id="category-select" class="form-select">

                        <option value="">Toutes</option>

                        <option value="materiel_medical">Matériel médical</option>

                        <option value="consommable">Consommable</option>

                    </select>

                </div>

                <div class="col-lg-4">

                    <button type="button" onclick="loadProducts()" class="btn btn-primary w-100">Appliquer</button>

                </div>

            </form>

        </div>

    </div>



    <div class="container mt-5 pb-5">

        <div class="row g-4" id="products-grid">

            <!-- Injecté par product_mgr.js -->

        </div>

    </div>



    <script src="../../config.js"></script>

    <script src="../../modules/layout.js"></script>

    <script>window.MedLayout.init();</script>

    <script src="../../modules/product_mgr.js"></script>

</body>

</html>
