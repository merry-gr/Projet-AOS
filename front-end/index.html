<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedConnect</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <script>
      // Open marketplace by default when hitting root.
      window.location.replace('./views/products/Marketplace.html');
    </script>
    <div class="container py-5">
      <div class="p-4 p-md-5 bg-white border rounded-4 shadow-sm">
        <h1 class="fw-bold mb-2">MedConnect</h1>
        <p class="text-muted mb-4">
          Front-end (static) connected to Users / Products / Orders microservices.
        </p>

        <div class="d-flex flex-wrap gap-2">
          <a class="btn btn-primary" href="./views/products/Marketplace.html">Marketplace</a>
          <a class="btn btn-outline-primary" href="./views/users/login.html">Login</a>
          <a class="btn btn-outline-secondary" href="./views/users/register.html">Register</a>
          <a class="btn btn-outline-dark" href="./views/orders/my_orders.html">My orders</a>
        </div>

        <hr class="my-4" />
        <div class="small text-muted">
          APIs: users <code>localhost:8000</code>, products <code>localhost:8001</code>,
          orders <code>localhost:8002</code>.
        </div>
      </div>
    </div>
  </body>
</html>
